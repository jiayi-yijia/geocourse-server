geocourse:
  infrastructure:
    mysql:
      host: ${MYSQL_HOST:192.168.200.129}
      port: ${MYSQL_PORT:3306}
      database: ${MYSQL_DATABASE:geocourse}
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:root123456}
    redis:
      host: ${REDIS_HOST:192.168.200.129}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: ${REDIS_DATABASE:0}
    rabbitmq:
      host: ${RABBITMQ_HOST:192.168.200.129}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USERNAME:admin}
      password: ${RABBITMQ_PASSWORD:admin123456}
      virtual-host: ${RABBITMQ_VHOST:/}
      management-port: ${RABBITMQ_MANAGEMENT_PORT:15672}
    elasticsearch:
      schema: ${ELASTICSEARCH_SCHEMA:http}
      host: ${ELASTICSEARCH_HOST:192.168.200.129}
      port: ${ELASTICSEARCH_PORT:9200}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://192.168.200.129:9000}
      console-endpoint: ${MINIO_CONSOLE_ENDPOINT:http://192.168.200.129:9001}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin123}
      bucket: ${MINIO_BUCKET:geocourse}
      public-url: ${MINIO_PUBLIC_URL:}
    vod:
      secret-id: ${TENCENTCLOUD_SECRET_ID:}
      secret-key: ${TENCENTCLOUD_SECRET_KEY:}
      region: ${TENCENTCLOUD_VOD_REGION:ap-beijing}
      sub-app-id: ${TENCENTCLOUD_VOD_SUB_APP_ID:}
      procedure: ${TENCENTCLOUD_VOD_PROCEDURE:}
    monitoring:
      prometheus-url: ${PROMETHEUS_URL:http://192.168.200.129:9090}
      grafana-url: ${GRAFANA_URL:http://192.168.200.129:3000}
      grafana-username: ${GRAFANA_USERNAME:admin}
    pgvector:
      host: ${PGVECTOR_HOST:192.168.200.129}
      port: ${PGVECTOR_PORT:5432}
      database: ${PGVECTOR_DATABASE:geocourse_ai}
      username: ${PGVECTOR_USERNAME:pgvector}
      password: ${PGVECTOR_PASSWORD:pgvector123456}
